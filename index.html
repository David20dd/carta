<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buenas noches, mi amor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cielo">
        <div class="luna"></div>

        <div class="nube nube1"></div>
        <div class="nube nube2"></div>
        <div class="nube nube3"></div>

        <div class="estrellas" id="estrellas"></div>

        <div class="tarjeta">
            <div class="corazon-grande">❤</div>

            <h1>Buenas noches, mi amor</h1>

            <p class="mensaje" id="mensaje">
                Que esta noche descanses bonito, que tus sueños sean tranquilos
                y que recuerdes lo mucho que te quiero.
            </p>

            <button onclick="cambiarMensaje()">Toca aquí para un mensajito</button>

            <div class="frase" id="frase">
                Eres mi pensamiento bonito antes de dormir.
            </div>
        </div>

        <div class="suelo"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
